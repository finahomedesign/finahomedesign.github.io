<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | FINA Home Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #fff; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 30px 5%; border-bottom: 1px solid #eee; }
        .logo { font-family: 'Playfair Display', serif; font-size: 22px; letter-spacing: 8px; text-transform: uppercase; text-decoration: none; color: #000; }
        .nav-links a { text-decoration: none; color: #000; margin-left: 25px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

        .gallery-header { text-align: center; padding: 80px 10%; }
        .gallery-header h1 { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 400; margin-bottom: 20px; }

        /* The Grid */
        .grid-container {
            columns: 3 300px;
            column-gap: 20px;
            padding: 0 5% 100px;
        }
        .grid-item {
            width: 100%;
            margin-bottom: 20px;
            background: #f9f9f9;
            break-inside: avoid;
            overflow: hidden;
        }
        .grid-item img {
            width: 100%;
            display: block;
            transition: transform 0.6s ease;
        }
        .grid-item:hover img { transform: scale(1.05); }

        footer { padding: 60px; text-align: center; font-size: 10px; letter-spacing: 3px; color: #aaa; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">FINA</a>
        <div class="nav-links">
            <a href="gallery.html">Gallery</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="gallery-header">
        <h1>Our Portfolio</h1>
        <p>A collection of curated transformations across Boise, Idaho.</p>
    </div>

    <div class="grid-container">
        <div class="grid-item"><img src="https://via.placeholder.com/600x800" alt="Staging project"></div>
        <div class="grid-item"><img src="https://via.placeholder.com/600x400" alt="Staging project"></div>
        <div class="grid-item"><img src="https://via.placeholder.com/600x900" alt="Staging project"></div>
        <div class="grid-item"><img src="https://via.placeholder.com/600x600" alt="Staging project"></div>
    </div>

    <footer>CURATED BY NICOLLE FINA &copy; 2026</footer>
</body>
</html>
