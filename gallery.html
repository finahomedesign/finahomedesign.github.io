<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | FINA Home Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #fff; color: #1a1a1a; }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid #eee; }
        .main-logo { height: 70px; width: auto; display: block; }
        .nav-links a { text-decoration: none; color: #1a1a1a; margin-left: 25px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

        /* Header & Filter Tabs */
        .gallery-header { text-align: center; padding: 80px 10% 20px; }
        .gallery-header h1 { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 400; margin: 0; }
        
        .filter-tabs { margin: 40px 0; display: flex; justify-content: center; gap: 30px; }
        .filter-btn { 
            background: none; border: none; font-family: 'Montserrat', sans-serif; 
            font-size: 11px; letter-spacing: 3px; text-transform: uppercase; 
            cursor: pointer; padding-bottom: 8px; border-bottom: 1px solid transparent;
            transition: 0.3s; color: #999;
        }
        .filter-btn.active { color: #1a1a1a; border-bottom: 1px solid #1a1a1a; }

        /* Portfolio Grid */
        .portfolio-grid { columns: 3 300px; column-gap: 20px; padding: 0 5% 100px; }
        .portfolio-item { width: 100%; margin-bottom: 20px; break-inside: avoid; display: block; overflow: hidden; transition: 0.4s ease-in-out; }
        .portfolio-item img { width: 100%; display: block; transition: 0.8s ease; }
        .portfolio-item:hover img { transform: scale(1.03); }

        /* Hidden Class for Filter Logic */
        .hide { display: none !important; }

        footer { padding: 60px; text-align: center; font-size: 10px; letter-spacing: 3px; color: #aaa; border-top: 1px solid #eee; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html"><img src="logo.png" alt="FINA Home Design Logo" class="main-logo"></a>
        <div class="nav-links">
            <a href="gallery.html">Gallery</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="gallery-header">
        <h1>Portfolio</h1>
        <div class="filter-tabs">
            <button class="filter-btn active" onclick="filterGallery('all')">View All</button>
            <button class="filter-btn" onclick="filterGallery('staging')">Home Staging</button>
            <button class="filter-btn" onclick="filterGallery('design')">Interior Design</button>
        </div>
    </div>

    <div class="portfolio-grid" id="galleryGrid">
        <div class="portfolio-item staging"><img src="assets/staging-01.jpg" alt="Boise Staging Project"></div>
        <div class="portfolio-item staging"><img src="assets/staging-02.jpg" alt="Eagle Staging Project"></div>
        
        <div class="portfolio-item design"><img src="assets/design-01.jpg" alt="Meridian Interior Design"></div>
        <div class="portfolio-item design"><img src="assets/design-02.jpg" alt="Treasure Valley Design Curation"></div>
    </div>

    <footer>Curated by Nicolle Fina &copy; 2026</footer>

    <script>
        function filterGallery(category) {
            const items = document.querySelectorAll('.portfolio-item');
            const buttons = document.querySelectorAll('.filter-btn');

            // Update Active Button State
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase().includes(category) || (category === 'all' && btn.innerText === 'VIEW ALL')) {
                    btn.classList.add('active');
                }
            });

            // Filter logic
            items.forEach(item => {
                if (category === 'all') {
                    item.classList.remove('hide');
                } else {
                    if (item.classList.contains(category)) {
                        item.classList.remove('hide');
                    } else {
                        item.classList.add('hide');
                    }
                }
            });
        }
    </script>

</body>
</html>
