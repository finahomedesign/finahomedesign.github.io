<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Gallery | FINA Home Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid #eee; }
        .main-logo { height: 70px; width: auto; }
        .nav-links a { text-decoration: none; color: #000; margin-left: 25px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
        .gallery-header { text-align: center; padding: 80px 10%; }
        .grid-container { columns: 3 300px; column-gap: 20px; padding: 0 5% 100px; }
        .grid-item { width: 100%; margin-bottom: 20px; overflow: hidden; }
        .grid-item img { width: 100%; display: block; transition: 0.6s ease; }
        .grid-item:hover img { transform: scale(1.05); }
        footer { padding: 60px; text-align: center; font-size: 10px; letter-spacing: 3px; color: #aaa; border-top: 1px solid #eee; }
    </style>
</head>

    <nav>
        <a href="index.html"><img src="logo.png" alt="FINA" class="main-logo"></a>
        <div class="nav-links">
            <a href="gallery.html">Gallery</a>

            <a href="contact.html">Contact</a>
        </div>
    </nav>
    <div class="gallery-header">
        <h1 style="font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 400;">Our Portfolio</h1>
    </div>
    <div class="grid-container">
        </div>
    <footer>CURATED BY NICOLLE FINA &copy; 2026</footer>
