<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | FINA Home Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; text-align: center; color: #1a1a1a; }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid #eee; }
        .main-logo { height: 70px; width: auto; display: block; }
        .nav-links a { text-decoration: none; color: #1a1a1a; margin-left: 25px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

        /* Contact Content */
        .contact-container {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 10%;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 400; margin-bottom: 20px; }
        
        .email-link {
            font-size: 18px;
            color: #1a1a1a;
            text-decoration: none;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 5px;
            transition: opacity 0.3s ease;
        }

        .email-link:hover { opacity: 0.6; }

        .location-tag {
            margin-top: 30px;
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #aaa;
        }

        footer { padding: 60px; text-align: center; font-size: 10px; letter-spacing: 3px; color: #aaa; border-top: 1px solid #eee; position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html"><img src="logo.png" alt="FINA Home Design Logo" class="main-logo"></a>
        <div class="nav-links">
            <a href="gallery.html">Gallery</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="contact-container">
        <h1>Inquire</h1>
        <p style="margin-bottom: 40px; color: #666;">For all staging and design inquiries, please contact us via email:</p>
        <a href="mailto:finahomedesign@gmail.com" class="email-link">finahomedesign@gmail.com</a>
        <p class="location-tag">Serving Boise & The Treasure Valley</p>
    </div>

    <footer>CURATED BY NICOLLE FINA &copy; 2026</footer>

</body>
</html>
