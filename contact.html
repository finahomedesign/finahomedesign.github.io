<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | FINA Home Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --black: #1a1a1a; --white: #ffffff; --gray: #f4f4f4; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; text-align: center; color: var(--black); background: var(--white); min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid #eee; }
        .main-logo { height: 80px; width: auto; display: block; }
        .nav-links a { text-decoration: none; color: var(--black); margin-left: 25px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: #888; }

        /* Contact Content - Fixed Overlap */
        .contact-container {
            flex: 1; /* Pushes footer to the bottom without overlapping */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 10%;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 400; margin-bottom: 30px; }
        
        .contact-info-block { margin-bottom: 40px; }
        
        .contact-item {
            font-size: 18px;
            margin: 20px 0;
            color: #444;
        }

        .contact-label {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #aaa;
            display: block;
            margin-bottom: 5px;
        }

        .contact-link {
            color: var(--black);
            text-decoration: none;
            border-bottom: 1px solid var(--black);
            padding-bottom: 3px;
            transition: opacity 0.3s ease;
        }

        .contact-link:hover { opacity: 0.6; }

        .location-tag {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #aaa;
            margin-top: 20px;
        }

        footer { padding: 60px 5%; text-align: center; font-size: 10px; letter-spacing: 3px; color: #aaa; border-top: 1px solid #eee; text-transform: uppercase; margin-top: auto; }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .contact-container { padding: 60px 5%; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">
            <img src="assets/FINA Home Design.png" alt="FINA Home Design Logo" class="main-logo">
        </a>
        <div class="nav-links">
            <a href="gallery.html">Gallery</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="contact-container">
        <h1>Inquire</h1>
        
        <div class="contact-info-block">
            <div class="contact-item">
                <span class="contact-label">Phone</span>
                <a href="tel:2084405575" class="contact-link">208-440-5575</a>
            </div>

            <div class="contact-item">
                <span class="contact-label">Email</span>
                <a href="mailto:finahomedesign@gmail.com" class="contact-link">finahomedesign@gmail.com</a>
            </div>
        </div>

        <p class="location-tag">Serving Boise & The Treasure Valley</p>
    </div>

    <footer>Curated by Nicolle Fina &copy; 2026 | Boise &bull; Eagle &bull; Meridian</footer>

</body>
</html>
